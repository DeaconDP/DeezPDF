<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="32" height="32" fill="#060810"/>
  <text x="16" y="16" text-anchor="middle" dominant-baseline="central" font-family="Georgia, Times New Roman, serif" font-size="20" fill="#00e5ff" filter="url(#glow)">ℵ</text>
</svg>
